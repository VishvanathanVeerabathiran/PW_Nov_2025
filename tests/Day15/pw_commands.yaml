TypeScript Installation commands:---------------------------------

1. npm install -g ts-node2. Check : tsc --version3. Compile the file first using the command : tsc filename.ts4. This will generate a filename.js file5. Now run the js file using the command : node filename.js
*** To run the tyescript file****npx tsc TypeScript.tsnode filename.js

Get-ExecutionPolicySet-ExecutionPolicy -Scope CurrentUser -ExecutionPolicy RemoteSigned

Note if you want directly run the .ts file follow below steps :--------------------------------------------------------------
1. npm install -g ts-node

2. npx tsc --init --> This will create a default tsconfig.json

3. Make below changes in the tsconfig.json{ "compilerOptions": { "module": "CommonJS" }}4. Now execute the file directly using the below command
 ts-node filename.ts
